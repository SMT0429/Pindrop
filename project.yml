name: Pindrop
options:
  bundleIdPrefix: com.smt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

targets:
  Pindrop:
    type: application
    platform: iOS
    sources:
      - path: Sources/Pindrop
      - path: Sources/Shared
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/Pindrop/Info.plist
      properties:
        CFBundleDisplayName: Pindrop
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationQueriesSchemes:
          - comgooglemaps
        GROQ_API_KEY: $(GROQ_API_KEY)
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smt.pindrop
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Entitlements/Pindrop.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: PindropShareExtension

  PindropShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/PindropShareExtension
      - path: Sources/Shared
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/PindropShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Pindrop
        GROQ_API_KEY: $(GROQ_API_KEY)
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.url\").@count > 0).@count > 0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smt.pindrop.shareextension
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Entitlements/PindropShareExtension.entitlements
