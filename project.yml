name: ToMap
options:
  bundleIdPrefix: com.smt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

targets:
  ToMap:
    type: application
    platform: iOS
    sources:
      - path: Sources/ToMap
      - path: Sources/Shared
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/ToMap/Info.plist
      properties:
        CFBundleDisplayName: ToMap
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationQueriesSchemes:
          - comgooglemaps
        GROQ_API_KEY: $(GROQ_API_KEY)
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smt.tomap
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Entitlements/ToMap.entitlements
    dependencies:
      - target: ToMapShareExtension

  ToMapShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ToMapShareExtension
      - path: Sources/Shared
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/ToMapShareExtension/Info.plist
      properties:
        CFBundleDisplayName: ToMap
        GROQ_API_KEY: $(GROQ_API_KEY)
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.url\").@count > 0).@count > 0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smt.tomap.shareextension
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Entitlements/ToMapShareExtension.entitlements
